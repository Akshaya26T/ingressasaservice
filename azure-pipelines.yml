trigger:
  branches:
    include:
      - main
      - develop
      - feature/*

pr:
  branches:
    include:
      - "*"

variables:
  composeFile: docker-compose.yml
  composeProject: ingress-ci
  baseUrl: http://127.0.0.1:3000
  deployEnabled: 'true'
  deployPool: agent

stages:
  - stage: CI
    displayName: Build and validate stack
    jobs:
      - job: BuildAndTest
        displayName: Build images and run smoke tests
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              docker --version
              docker compose version
            displayName: Show Docker versions

          - script: |
              chmod +x check_canary_split.sh
              chmod +x scripts/ci-smoke-test.sh
            displayName: Make scripts executable

          - script: docker compose -f $(composeFile) config
            displayName: Validate compose file

          - script: |
              export COMPOSE_PROJECT_NAME=$(composeProject)
              docker compose -f $(composeFile) build app1 app1-canary app2 app3
            displayName: Build service images

          - script: |
              export COMPOSE_PROJECT_NAME=$(composeProject)
              docker compose -f $(composeFile) up -d traefik app1 app1-canary app2 app3
              docker compose -f $(composeFile) ps
            displayName: Start stack

          - script: scripts/ci-smoke-test.sh $(baseUrl)
            displayName: Run smoke tests

          - script: |
              export COMPOSE_PROJECT_NAME=$(composeProject)
              docker compose -f $(composeFile) logs --no-color > compose.log
            displayName: Capture compose logs
            condition: always()

          - publish: compose.log
            artifact: compose-logs
            displayName: Publish logs artifact
            condition: always()

          - script: |
              export COMPOSE_PROJECT_NAME=$(composeProject)
              docker compose -f $(composeFile) down -v --remove-orphans
            displayName: Tear down stack
            condition: always()

  - stage: CD
    displayName: Deploy to environment
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['deployEnabled'], 'true'))
    jobs:
      - deployment: DeployComposeStack
        displayName: Deploy compose stack on self-hosted agent
        pool:
          name: $(deployPool)
        environment: ingressasaservice-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    chmod +x check_canary_split.sh
                    chmod +x scripts/ci-smoke-test.sh
                  displayName: Make scripts executable

                - script: |
                    docker --version
                    docker compose version
                  displayName: Verify Docker on deployment agent

                - script: |
                    export COMPOSE_PROJECT_NAME=ingressasaservice
                    docker compose -f $(composeFile) pull || true
                    docker compose -f $(composeFile) up -d --build
                    docker compose -f $(composeFile) ps
                  displayName: Deploy stack

                - script: scripts/ci-smoke-test.sh $(baseUrl)
                  displayName: Run post-deploy smoke tests
